                      - img [ref=f98e627]
                    - generic [ref=f98e629] [cursor=pointer]: OpenAI-Compatible with API Key Authentication
                  - generic [ref=f98e630]:
                    - text: The default base URL for the
                    - code [ref=f98e631]: openai
                    - text: provider is
                    - code [ref=f98e632]: https://api.openai.com/v1
                    - text: . For self-hosted OpenAI-compatible endpoints, ensure your full URL ends with
                    - code [ref=f98e633]: /chat/completions
                    - text: ", but exclude this path when providing the"
                    - code [ref=f98e634]: custom_host
                    - text: during registration.
