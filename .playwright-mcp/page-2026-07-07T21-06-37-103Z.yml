                  - generic [ref=f98e603]: "watsonx Orchestrate provides optimized support for:"
                  - list [ref=f98e604]:
                    - listitem [ref=f98e605]:
                      - strong [ref=f98e606]: gpt-oss-120b
                      - text: via Groq or AWS Bedrock providers
                    - listitem [ref=f98e607]:
                      - strong [ref=f98e608]: gpt-oss-120b
                      - text: via watsonx.ai in GovCloud environments (available April mid-release)
                  - generic [ref=f98e609]: These model/provider combinations have undergone extensive testing and optimization for agent workflows.
                  - heading "Navigate to header Testing Requirements" [level=3] [ref=f98e610]:
                    - link "Navigate to header" [ref=f98e611] [cursor=pointer]:
                      - /url: "#testing-requirements"
                      - img [ref=f98e613]
                    - generic [ref=f98e615] [cursor=pointer]: Testing Requirements
                  - generic [ref=f98e616]: When registering virtual models with other providers, allocate sufficient time to validate that the combination works correctly. Testing may identify incompatibilities that prevent the agent from functioning as expected.
                  - heading "Navigate to header Using Custom Provider Endpoints" [level=2] [ref=f98e617]:
                    - link "Navigate to header" [ref=f98e618] [cursor=pointer]:
                      - /url: "#using-custom-provider-endpoints"
                      - img [ref=f98e620]
                    - generic [ref=f98e622] [cursor=pointer]: Using Custom Provider Endpoints
                  - generic [ref=f98e623]: If you self-host an LLM or have a model proxy/gateway as a pass-through to another provider, you may be able to leverage OpenAI chat completion compatibility. This section covers authentication options for custom endpoints.
                  - heading "Navigate to header OpenAI-Compatible with API Key Authentication" [level=3] [ref=f98e624]:
