                  - list [ref=f98e590]:
                    - listitem [ref=f98e591]:
                      - strong [ref=f98e592]: New models and API changes
                      - text: ": Models are released frequently, and some introduce API specification changes that may cause runtime errors"
                    - listitem [ref=f98e593]:
                      - strong [ref=f98e594]: Intermediate infrastructure
                      - text: ": If there are components in the request path between watsonx Orchestrate and the provider (such as gateways, proxies, or adapters), these may introduce incompatibilities or special authentication requirements that watsonx Orchestrate does not support"
                    - listitem [ref=f98e595]:
                      - strong [ref=f98e596]: Model suitability
                      - text: ": Not all models are well-suited for agentic workflows. Even when a model registers successfully and runs without errors, the results may not be accurate enough for business-critical agents"
                  - heading "Navigate to header Optimized Support" [level=3] [ref=f98e597]:
                    - link "Navigate to header" [ref=f98e598] [cursor=pointer]:
