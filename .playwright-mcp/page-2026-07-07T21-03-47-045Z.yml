                - generic [ref=f75e416]:
                  - generic [ref=f75e417]: The Agent Development Kit (ADK) gives you a set of developer-focused tools to build, test, and manage agents in watsonx Orchestrate. With the ADK, you take full control of agent design using a lightweight framework and a simple CLI.
                  - generic [ref=f75e418]: Define agents in clear YAML or JSON files, create custom Python tools, and manage the entire agent lifecycle with just a few commands.
                  - generic [ref=f75e419]: This guide walks you through installing the ADK, setting up your local development environment, and deploying your first agent to a watsonx Orchestrate SaaS instance. Start building flexible, reusable AI agents right away.
