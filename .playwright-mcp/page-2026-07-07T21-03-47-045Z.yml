                    - generic [ref=f75e675] [cursor=pointer]: Creating your first agent
                  - generic [ref=f75e676]: With your ADK connected to your watsonx Orchestrate instance, you’re ready to test your setup by publishing a simple agent.
                  - generic [ref=f75e677]: In watsonx Orchestrate, you define agents using YAML or JSON files. The agent specification file includes key details like the agent’s name, kind, instructions for the LLM, and the tools it can use.
                  - generic [ref=f75e678]: When you build agents with the ADK, you write this specification yourself. This approach gives you full control over your agent’s behavior and capabilities. You can create advanced agents with custom tools, collaborators, or integrations. For now, start with a minimal Hello World agent to verify your setup.
